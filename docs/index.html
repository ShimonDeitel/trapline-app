<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trapline</title>
<style>
  body { margin:0; background:#111411; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .wrap { max-width:560px; }
  h1 { font-size:2.2rem; margin-bottom:0.5rem; color:#8c7233; }
  p { font-size:1.1rem; opacity:0.85; line-height:1.5; }
  .badge { display:inline-block; margin-top:24px; padding:10px 22px; border:1px solid #8c7233; border-radius:999px; color:#8c7233; text-decoration:none; }
  footer { margin-top:48px; font-size:0.85rem; opacity:0.5; }
  footer a { color:#8c7233; text-decoration:none; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8c723355 0%, #8c723300 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Trapline</h1>
  <p>Track trail camera checks and wildlife capture events.</p>
  <a class="badge" href="#">Available on the App Store</a>
  <footer><a href="privacy.html">Privacy</a> &nbsp;&middot;&nbsp; <a href="terms.html">Terms</a> &nbsp;&middot;&nbsp; s0533495227@gmail.com</footer>
</div>
</body>
</html>
